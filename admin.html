<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ITFIT Vault – Správa členů</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div id="auth-bar" class="auth-bar"></div>

  <main class="auth-panel">
    <h1>Správa členů</h1>
    <p class="hint">Tato administrace funguje pouze v rámci localStorage tohoto prohlížeče.</p>

    <form id="memberForm">
      <label for="name">Jméno</label>
      <input id="name" type="text" required placeholder="Jméno člena" />

      <label for="email">E-mail</label>
      <input id="email" type="email" required placeholder="name@email.cz" />

      <label for="password">Heslo</label>
      <input id="password" type="text" required placeholder="Vygeneruj nebo zadej" />

      <div style="margin-top:16px; display:flex; gap:10px; align-items:center;">
        <button type="submit" class="auth-bar button">Přidat člena</button>
        <span id="adminMessage" class="hint"></span>
      </div>
    </form>

    <table class="auth-table" id="memberTable">
      <thead>
        <tr>
          <th>Jméno</th>
          <th>E-mail</th>
          <th>Role</th>
          <th></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="auth.js"></script>
  <script>
    Auth.requireAdmin();
    const tableBody = document.querySelector('#memberTable tbody');
    const message = document.getElementById('adminMessage');

    function renderMembers() {
      const users = Auth.loadUsers();
      tableBody.innerHTML = users.map(user => {
        const badge = user.role === 'admin'
          ? '<span class="auth-tag">ADMIN</span>'
          : '<span class="auth-tag">MEMBER</span>';
        const deleteBtn = user.role === 'admin'
          ? ''
          : `<button class="auth-bar button auth-danger" data-id="${user.id}">Smazat</button>`;
        return `
          <tr>
            <td>${user.name}</td>
            <td>${user.email}</td>
            <td>${badge}</td>
            <td>${deleteBtn}</td>
          </tr>
        `;
      }).join('');

      tableBody.querySelectorAll('button[data-id]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-id');
          const users = Auth.loadUsers().filter(u => u.id !== id);
          Auth.saveUsers(users);
          renderMembers();
        });
      });
    }

    document.getElementById('memberForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      if (!name || !email || !password) {
        message.textContent = 'Vyplň všechna pole.';
        return;
      }
      const users = Auth.loadUsers();
      if (users.some(u => u.email.toLowerCase() === email)) {
        message.textContent = 'Uživatel s tímto e-mailem už existuje.';
        return;
      }
      const id = `user_${Date.now()}`;
      users.push({ id, name, email, password, role: 'member' });
      Auth.saveUsers(users);
      message.textContent = 'Uživatel přidán.';
      e.target.reset();
      renderMembers();
    });

    renderMembers();
  </script>
</body>
</html>
