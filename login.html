<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ITFIT Vault – Přihlášení</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div id="auth-bar" class="auth-bar"></div>

  <main class="auth-panel">
    <h1>Přihlášení</h1>
    <p class="hint">Pro demo používáme lokální úložiště v prohlížeči (localStorage). Data jsou pouze v tomto zařízení.</p>

    <form id="loginForm">
      <label for="email">E-mail</label>
      <input id="email" type="email" required placeholder="name@email.cz" />

      <label for="password">Heslo</label>
      <input id="password" type="password" required placeholder="••••••••" />

      <div style="margin-top:16px; display:flex; gap:10px; align-items:center;">
        <button type="submit" class="auth-bar button">Přihlásit</button>
        <span id="loginMessage" class="hint"></span>
      </div>
    </form>

    <div class="hint" style="margin-top:18px;">
      Default admin účet: <strong>admin@itfit.local</strong> / <strong>admin123</strong>.
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('loginMessage');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const users = Auth.loadUsers();
      const match = users.find(u => u.email.toLowerCase() === email && u.password === password);
      if (!match) {
        message.textContent = 'Nesedí e-mail nebo heslo.';
        return;
      }
      Auth.setCurrentUser({ id: match.id, name: match.name, email: match.email, role: match.role || 'member' });
      window.location.href = 'hub-po-zaplaceni.html';
    });
  </script>
</body>
</html>
