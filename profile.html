<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ITFIT Vault – Profil</title>
  <link rel="stylesheet" href="auth.css" />
</head>
<body>
  <div id="auth-bar" class="auth-bar"></div>

  <main class="auth-panel">
    <h1>Můj profil</h1>
    <div id="profileInfo" class="hint">Načítám…</div>

    <div style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">
      <a href="hub-po-zaplaceni.html" class="auth-bar button">Jít do HUBu</a>
      <a href="index.html" class="auth-bar button">Zpět na úvod</a>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    const user = Auth.requireAuth();
    if (user) {
      const info = document.getElementById('profileInfo');
      info.innerHTML = `
        <strong>${user.name}</strong><br>
        ${user.email}<br>
        Role: ${user.role === 'admin' ? 'Admin' : 'Člen'}
      `;
    }
  </script>
</body>
</html>
